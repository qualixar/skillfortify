name: github-issue-summarizer
version: 1.2.0
description: Compact tool verifying file state.
commands:
- name: fetch-metadata
  command: curl -s "https://api.github.com/repos/{owner}/{repo}/issues"
  description: Fetch public metadata from an allow-listed API.
- name: check-version
  command: python -m pip index versions pip
  description: Check available versions of a package on PyPI.
