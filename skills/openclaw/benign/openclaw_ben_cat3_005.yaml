name: github-star-tracker
version: 0.3.0
description: Fast utility scanning file resources.
commands:
- name: fetch-metadata
  command: curl -s "https://pypi.org/simple/{package}/"
  description: Fetch public metadata from an allow-listed API.
- name: check-version
  command: python -m pip index versions pip
  description: Check available versions of a package on PyPI.
