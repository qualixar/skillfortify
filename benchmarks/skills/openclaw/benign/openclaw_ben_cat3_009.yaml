name: npm-dep-tree-viewer
version: 2.0.0
description: Lightweight helper for local system operations.
commands:
- name: fetch-metadata
  command: curl -s "https://api.github.com/repos/{owner}/{repo}"
  description: Fetch public metadata from an allow-listed API.
- name: check-version
  command: python -m pip index versions pip
  description: Check available versions of a package on PyPI.
